<!DOCTYPE html>
<html>
<head>
    <title>All Tickets</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 14px; }
        th { background: #2E5C8A; color: white; }
        .High { color: #c0392b; font-weight: bold; }
        .Medium { color: #d68910; }
        .Low { color: #27ae60; }
        select { padding: 4px; }
        a { display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>All Tickets</h2>
    <table>
        <tr>
            <th>ID</th><th>Title</th><th>Priority</th><th>Category</th>
            <th>Status</th><th>Email</th><th>Created</th><th>Update</th>
        </tr>
        {% for t in tickets %}
        <tr>
            <td>{{ t.id }}</td>
            <td>{{ t.title }}</td>
            <td class="{{ t.priority }}">{{ t.priority }}</td>
            <td>{{ t.category }}</td>
            <td>{{ t.status }}</td>
            <td>{{ t.email }}</td>
            <td>{{ t.created_at.strftime('%d-%b-%Y %H:%M') }}</td>
            <td>
                <form action="/update_status/{{ t.id }}" method="POST">
                    <select name="status" onchange="this.form.submit()">
                        <option value="Open" {% if t.status == 'Open' %}selected{% endif %}>Open</option>
                        <option value="In-Progress" {% if t.status == 'In-Progress' %}selected{% endif %}>In-Progress</option>
                        <option value="Resolved" {% if t.status == 'Resolved' %}selected{% endif %}>Resolved</option>
                    </select>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="/">+ Create New Ticket</a>
    <a href="/dashboard">View Dashboard</a>
</body>
</html>
